name: build-host

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    name: Windows x64 (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --bin remote-host
      - uses: actions/upload-artifact@v4
        with:
          name: remote-host-windows-x64
          path: target/release/remote-host.exe

  linux:
    name: Linux x64 (binary + .deb)
    # Pinned to 22.04 (glibc 2.35) for broad compatibility.
    # Binary will also run on Ubuntu 24.04, Debian 12, Mint 21, Pop!_OS 22.04+, etc.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2-ubuntu-22.04"
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libclang-dev \
            libxcb1-dev libxrandr-dev libxdo-dev \
            libdbus-1-dev libpipewire-0.3-dev libwayland-dev libegl-dev \
            libgbm-dev libdrm-dev
      - name: Build
        run: cargo build --release --bin remote-host
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build .deb
        run: cargo deb --no-build --no-strip
      - uses: actions/upload-artifact@v4
        with:
          name: remote-host-linux-x64
          path: |
            target/release/remote-host
            target/debian/*.deb
